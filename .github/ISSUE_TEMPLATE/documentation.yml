name: Documentation improvement
description: Fix missing, confusing, or outdated docs.
title: "docs: "
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Where is the documentation problem?
      description: Link the file/section or describe where it is.
      placeholder: "Example: README Quick start step 2, or backend/.env.example"
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is confusing or incorrect?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: If you have a specific wording suggestion, include it here.
    validations:
      required: false

